<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — SAWAOR-ERICK-AYC-ALADJI</title>
<meta name="description" content="Contactez SAWAOR-ERICK-AYC-ALADJI — achat et vente d'or en Suisse.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .contact-wrap{display:grid;grid-template-columns:1fr 1fr;gap:40px}
  .contact-form{background:var(--card-dark);border:1px solid var(--line);border-radius:var(--radius);padding:34px}
  .contact-form label{display:block;margin:14px 0 6px;font-weight:600;color:#ddd;font-size:14px}
  .contact-form input,.contact-form textarea{width:100%;background:#0e0e10;border:1px solid var(--line);border-radius:10px;padding:13px 14px;color:#fff;font:inherit}
  .contact-form input:focus,.contact-form textarea:focus{outline:none;border-color:var(--gold)}
  .contact-info p{color:var(--grey);margin-bottom:14px}
  .contact-info .big{color:var(--gold);font-size:26px;font-weight:800}
  @media(max-width:820px){.contact-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="header"></div>

<section class="page-hero" style="min-height:36vh">
  <h1 data-i18n="nav.contact">CONTACT</h1>
</section>

<section class="section section-dark">
  <div class="container contact-wrap">
    <div class="contact-info">
      <div class="eyebrow" data-i18n="bq.contact">N'hésitez pas à nous contacter</div>
      <h2 class="section-title" style="font-size:30px">SAWAOR-ERICK-AYC-ALADJI</h2>
      <p class="big" id="cMail">contact@sawaor.ch</p>
      <p id="cWa"><a href="https://wa.me/595995367517" target="_blank" rel="noopener">WhatsApp +595 995 367 517</a></p>
      <p data-i18n="bq.cov.title" style="color:var(--grey)">Présents dans toute la Suisse</p>
      <div class="socials map-grid" style="display:flex;gap:14px;margin-top:10px" id="cSocials"></div>
    </div>
    <form class="contact-form" onsubmit="event.preventDefault();this.reset();alert((typeof I18N!=='undefined'&&I18N[curLang()]&&I18N[curLang()]['contact.sent'])||'Merci !');">
      <label data-i18n="contact.name">Nom</label><input required type="text">
      <label data-i18n="contact.email">Email</label><input required type="email">
      <label data-i18n="contact.message">Message</label><textarea rows="5" required></textarea>
      <button class="btn btn-gold" type="submit" data-i18n="contact.send" style="margin-top:18px;width:100%;justify-content:center">Envoyer</button>
    </form>
  </div>
</section>

<div id="footer"></div>

<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script>
  document.getElementById('header').innerHTML=buildHeader('contact');
  document.getElementById('footer').innerHTML=buildFooter();
  document.getElementById('cMail').innerHTML='<a href="mailto:'+EMAIL+'">'+EMAIL+'</a>';
  document.getElementById('cSocials').innerHTML=socialLinks('');
  initCommon();
</script>
</body>
</html>
